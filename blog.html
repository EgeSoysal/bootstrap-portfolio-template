    <div class="modal fade" id="createPostModal" tabindex="-1" aria-labelledby="createPostModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-body-tertiary border-secondary-subtle">

                    <h5 class="modal-title fw-bold" id="createPostModalLabel">Create New Post</h5>
                    <button type="button" class="btn-close" data-bs-shadow="none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="postForm">
                        <input type="hidden" id="editPostId" value="">

                        <div class="mb-3">
                            <label for="postTitle" class="form-label small fw-bold">Title</label>
                            <input type="text" class="form-control" id="postTitle" required placeholder="Enter post title...">
                        </div>
                        <div class="mb-3">

                        </div>
                        <div class="mb-3">
                            <label for="postImage" class="form-label small fw-bold">Image (Leave blank to keep the current image or remain without an image)</label>

                        </div>
                        <div class="text-end mt-4">

                            <button type="submit" class="btn btn-warning text-white fw-bold" style="background-color: var(--accent-color); border:none;">Save</button>
                        </div>
                    </form>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        // Sayfa açıldığında verileri hafızadan yükle
        document.addEventListener("DOMContentLoaded", () => {
            loadPosts();
        });

        // Yeni Gönderi Butonuna Basıldığında Formu Sıfırla ve Başlığı Düzelt
        function openCreateModal() {
            document.getElementById('postForm').reset();
            document.getElementById('editPostId').value = ""; // ID alanını temizle
            document.getElementById('createPostModalLabel').innerText = "Create New Post";
            
            const modal = new bootstrap.Modal(document.getElementById('createPostModal'));
            modal.show();
        }

        // Form Gönderildiğinde Tetiklenen Alan
        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const id = document.getElementById('editPostId').value;
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const imageFile = document.getElementById('postImage').files[0];

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    processPost(id, title, content, event.target.result);
                };
                reader.readAsDataURL(imageFile);
            } else {
                // Düzenleme modundaysa ve yeni resim seçilmediyse eski resmi koru
                let currentImage = null;
                if (id) {
                    const posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
                    const existingPost = posts.find(p => p.id == id);
                    if (existingPost) currentImage = existingPost.image;
                }
                processPost(id, title, content, currentImage);
            }
        });

        // Yazıyı Ekleme veya Güncelleme Mantığı
        function processPost(id, title, content, imageSrc) {
            let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];

            if (id) {
                // DÜZENLEME (UPDATE) MODU
                posts = posts.map(post => {
                    if (post.id == id) {
                        return {
                            ...post,
                            title: title,
                            content: content,
                            image: imageSrc
                        };
                    }
                    return post;
                });
            } else {
                // YENİ EKLEME (CREATE) MODU
                const newPost = {
                    id: Date.now(),
                    title: title,
                    content: content,
                    image: imageSrc,
                    date: new Date().toLocaleDateString('tr-TR')
                };
                posts.unshift(newPost);
            }

            localStorage.setItem('blogPosts', JSON.stringify(posts));

            // Modalı Kapatma
            const modalElement = document.getElementById('createPostModal');
            const modal = bootstrap.Modal.getInstance(modalElement) || bootstrap.Modal.getOrCreateInstance(modalElement);
            modal.hide();

            loadPosts();
        }

        // Yazıyı Düzenleme Moduna Alıp Modalı Açan Fonksiyon
        function editPost(id) {
            const posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
            const post = posts.find(p => p.id == id);

            if (post) {
                document.getElementById('editPostId').value = post.id;
                document.getElementById('postTitle').value = post.title;
                document.getElementById('postContent').value = post.content;
                document.getElementById('createPostModalLabel').innerText = "Edit Post";

                const modalElement = document.getElementById('createPostModal');
                const modal = bootstrap.Modal.getInstance(modalElement) || bootstrap.Modal.getOrCreateInstance(modalElement);
                modal.show();
            }
        }

        // Yazıyı Hafızadan Silen Fonksiyon
        function deletePost(id) {
            if (confirm("Are you sure you want to delete this blog post?")) {
                let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
                posts = posts.filter(post => post.id != id);
                localStorage.setItem('blogPosts', JSON.stringify(posts));
                loadPosts();
            }
        }

        // Gönderileri Arayüze Basma Motoru
        function loadPosts() {
            const container = document.getElementById('blogContainer');
            let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];

            // Eğer lokal hafıza tamamen boşsa şablon olarak 2 örnek yükle
            if (posts.length === 0) {
                posts = [
                    {
                        id: 111,
                        title: "Yazılım Dünyasında Minimalizm",
                        content: "Kod yazarken karmaşadan kaçınmak ve her şeyi en sade haliyle tasarlamak hem performansı artırır hem de maintain etmeyi kolaylaştırır. Fonksiyonel tasarımlar her zaman kazanır.",
                        image: "assets/images/resim1.png", 
                        date: "20.05.2026"
                    },
                    {
                        id: 222,
                        title: "Işığı Yakalamak",
                        content: "Fotoğrafçılıkta kompozisyon ve geometrik hatlar, sadece bir resmi değil o anın tüm hissini taşır. Doğru ışık, sıradan bir sokağı sanata dönüştürebilir.",
                        image: null, 
                        date: "18.05.2026"
                    }
                ];
                localStorage.setItem('blogPosts', JSON.stringify(posts));
            }

            container.innerHTML = "";

            posts.forEach(post => {
                let imageHTML = "";
                if (post.image) {
                    imageHTML = `
                        <div class="blog-img-wrapper mb-3">
                            <img src="${post.image}" alt="${post.title}" onerror="this.parentElement.style.display='none'">
                        </div>
                    `;
                }

                const cardHTML = `
                    <article class="blog-card p-4 shadow-sm" data-id="${post.id}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <h2 class="h4 fw-bold mb-1">${post.title}</h2>
                                <span class="text-secondary small d-block mb-2">${post.date}</span>
                            </div>
                            
                            <div class="dropdown">
                                <button class="post-menu-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow border-secondary-subtle">
                                    <li>
                                        <a class="dropdown-item d-flex align-items-center gap-2" href="#" onclick="editPost(${post.id}); return false;">
                                            <i class="bi bi-pencil small text-warning"></i> Edit
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item d-flex align-items-center gap-2 text-danger" href="#" onclick="deletePost(${post.id}); return false;">
                                            <i class="bi bi-trash small"></i> Delete
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        ${imageHTML}
                        <p class="text-body-secondary mb-0" style="white-space: pre-line; line-height: 1.7;">${post.content}</p>
                    </article>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Tema Yönetimi
        function toggleTheme() {
            const htmlTag = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            if (htmlTag.getAttribute('data-bs-theme') === 'dark') {
                htmlTag.setAttribute('data-bs-theme', 'light');
                themeIcon.className = 'bi bi-moon-fill';
            } else {
                htmlTag.setAttribute('data-bs-theme', 'dark');
                themeIcon.className = 'bi bi-sun-fill';
            }
        }
    </script>
